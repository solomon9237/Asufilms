<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASUfilms</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>ASUfilms</h1>
      <p class="subtitle">Turn your ideas into video, instantly</p>
    </header>

    <main>
      <div class="prompt-box">
        <textarea
          id="promptInput"
          placeholder="Describe the video you want to create... e.g. 'A drone shot flying over Lagos at sunset, cinematic'"
          rows="4"
        ></textarea>
        <button id="generateBtn">Generate Video</button>
      </div>

      <div id="statusBox" class="status-box hidden">
        <div class="spinner"></div>
        <p id="statusText">Starting generation...</p>
      </div>

      <div id="resultBox" class="result-box hidden">
        <video id="resultVideo" controls></video>
        <a id="downloadLink" download="generated-video.mp4">Download Video</a>
      </div>

      <div id="errorBox" class="error-box hidden">
        <p id="errorText"></p>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
